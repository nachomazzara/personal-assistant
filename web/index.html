<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="header">
    <form id="prompt-form">
      <input
        id="prompt-input"
        type="text"
        placeholder="Search flights, compare prices..."
        autocomplete="off"
        autofocus
      />
      <button type="submit" id="prompt-btn" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>
  </header>

  <div id="filters" class="hidden">
    <div class="filter-group">
      <label>Price</label>
      <span id="price-label">$0 – $0</span>
      <input type="range" id="price-min" min="0" max="5000" value="0" />
      <input type="range" id="price-max" min="0" max="5000" value="5000" />
    </div>
    <div class="filter-group">
      <label>Max duration</label>
      <span id="duration-label">0h</span>
      <input type="range" id="duration-max" min="0" max="2000" value="2000" />
    </div>
    <div class="filter-group">
      <label>Stops</label>
      <div class="stops-buttons">
        <button type="button" class="stop-btn active" data-stops="any">Any</button>
        <button type="button" class="stop-btn" data-stops="0">Direct</button>
        <button type="button" class="stop-btn" data-stops="1">1 stop</button>
        <button type="button" class="stop-btn" data-stops="2">2+</button>
      </div>
    </div>
    <div class="filter-meta">
      <span id="filter-count"></span>
      <button id="view-toggle" type="button">All combined</button>
      <button id="filter-reset" type="button">Reset</button>
    </div>
  </div>

  <main id="results"></main>

  <script type="module" src="/app.js"></script>
  <script>
    // Live reload
    (function() {
      const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/livereload`);
      ws.onmessage = () => location.reload();
      ws.onclose = () => setTimeout(() => location.reload(), 1000);
    })();
  </script>
</body>
</html>
