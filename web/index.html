<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="header">
    <form id="prompt-form">
      <input
        id="prompt-input"
        type="text"
        placeholder="Search flights, compare prices..."
        autocomplete="off"
        autofocus
      />
      <button type="submit" id="prompt-btn" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>
  </header>

  <div id="filters" class="hidden">
    <select id="price-filter" class="filter-select">
      <option value="any">Any price</option>
      <option value="500">Under $500</option>
      <option value="1000">Under $1,000</option>
      <option value="1500">Under $1,500</option>
      <option value="2000">Under $2,000</option>
      <option value="3000">Under $3,000</option>
    </select>
    <select id="duration-filter" class="filter-select">
      <option value="any">Any duration</option>
      <option value="720">Under 12h</option>
      <option value="960">Under 16h</option>
      <option value="1200">Under 20h</option>
      <option value="1440">Under 24h</option>
    </select>
    <select id="source-filter" class="filter-select">
      <option value="any">All sources</option>
    </select>
    <div class="stops-pills">
      <button type="button" class="stop-btn active" data-stops="any">Any</button>
      <button type="button" class="stop-btn" data-stops="0">Direct</button>
      <button type="button" class="stop-btn" data-stops="1">1 stop</button>
      <button type="button" class="stop-btn" data-stops="2">2+</button>
    </div>
    <span id="filter-count" class="filter-count"></span>
    <button id="view-toggle" type="button" class="filter-btn">All combined</button>
    <button id="filter-reset" type="button" class="filter-btn">Reset</button>
  </div>

  <main id="results"></main>

  <script type="module" src="/app.js"></script>
  <script>
    // Live reload
    (function() {
      const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/livereload`);
      ws.onmessage = () => location.reload();
      ws.onclose = () => setTimeout(() => location.reload(), 1000);
    })();
  </script>
</body>
</html>
